# =============================================================================
# python-tests — quality gates for the nexus_deploy package
# =============================================================================
# Runs on every push and PR. Three jobs:
#   - lint:        ruff format check + ruff lint + shellcheck (fast, ~30s)
#   - typecheck:   mypy --strict (~1-2 min, depends on cache hit)
#   - test:        pytest unit + integration with coverage gate (≥80%)
#
# Tests run only when Python or workflow files change — to keep CI cheap
# during pure docs/stack PRs.
# =============================================================================

name: Python Tests

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-tests.yml"
      - "scripts/*.sh"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-tests.yml"
      - "scripts/*.sh"

# Cancel previous runs of this workflow on the same ref. The CI is fast
# but no point burning minutes on a force-push that obsoletes the prior
# attempt.
concurrency:
  group: python-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ruff (Python) + shellcheck (bash helpers)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff + shellcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Sync dev deps
        run: uv sync --frozen --group dev

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: ruff lint
        run: uv run ruff check .

      - name: shellcheck remaining bash
        run: |
          # The remaining bash scripts (deploy.sh shrinks phase-by-phase
          # but is here through Phase 3; the small helpers stay bash).
          # `find -print0 | xargs -0` is portable to macOS bash 3.2 too.
          #
          # `--severity=error` only blocks on real bugs. Existing scripts
          # (deploy.sh in particular) carry a long tail of style/info nits
          # (SC2029, SC2086, SC2087, etc.) that are out of scope for Phase 0
          # — Phase 4 (#505) tightens this to `--severity=warning` once
          # deploy.sh is gone and only the small helpers remain.
          find scripts -maxdepth 2 -name '*.sh' -type f -print0 \
            | xargs -0 uv run shellcheck --severity=error --exclude=SC1091,SC2001

  # ---------------------------------------------------------------------------
  # Typecheck — mypy --strict
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck (mypy --strict)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Sync deps (incl. type stubs)
        run: uv sync --frozen --group dev

      - name: mypy strict
        run: uv run mypy

  # ---------------------------------------------------------------------------
  # Test — pytest unit + integration, coverage gate ≥80%
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen --group dev

      - name: pytest unit
        # Phase 0: only unit tests exist. Integration tests land in Phase 1
        # and run via the same step (pytest discovers them via testpaths).
        # `--cov-fail-under=80` gates the run; pyproject.toml's
        # [tool.coverage.report] also has fail_under=80 so local + CI agree.
        run: uv run pytest --cov --cov-report=term-missing

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 7
          if-no-files-found: ignore
