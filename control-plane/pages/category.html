<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category - Nexus Control Plane</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a2e;
      --accent: #00ff88;
      --accent-dim: #00cc6a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      --border: #2a2a3e;
      --error: #ff4444;
      --warning: #ffaa00;
      --info: #00aaff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -2;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 1rem;
    }

    h1 {
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: all 0.3s;
    }

    .nav-links a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Category header */
    .category-header {
      margin-bottom: 2rem;
    }

    .category-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .category-description {
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .category-stats {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
      font-size: 0.85rem;
    }

    .category-stats span {
      color: var(--text-muted);
    }

    .category-stats .count-enabled {
      color: var(--accent);
    }

    .category-stats .count-pending {
      color: var(--warning);
    }

    /* Pending changes banner */
    .pending-banner {
      background: rgba(255, 170, 0, 0.1);
      border: 1px solid rgba(255, 170, 0, 0.3);
      padding: 0.8rem 1.2rem;
      margin-bottom: 1.5rem;
      display: none;
      align-items: center;
      gap: 0.8rem;
      font-size: 0.85rem;
      color: var(--warning);
    }

    .pending-banner.visible {
      display: flex;
    }

    .pending-banner a {
      color: var(--accent);
      text-decoration: none;
    }

    .pending-banner a:hover {
      text-decoration: underline;
    }

    /* Service cards grid */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1.2rem;
    }

    .service-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 1.2rem;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .service-card:hover {
      border-color: rgba(0, 255, 136, 0.3);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
    }

    .service-card.pending {
      border-left: 3px solid var(--warning);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .card-name-section {
      flex: 1;
    }

    .card-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 0.65rem;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-core {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    .badge-admin {
      background: rgba(136, 136, 136, 0.2);
      color: #888;
      border: 1px solid rgba(136, 136, 136, 0.3);
    }

    .badge-public {
      background: rgba(255, 170, 0, 0.2);
      color: var(--warning);
      border: 1px solid rgba(255, 170, 0, 0.3);
    }

    .badge-pending {
      background: rgba(255, 215, 0, 0.15);
      color: #ffd700;
      border: 1px solid rgba(255, 215, 0, 0.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .badge-internal {
      background: rgba(0, 170, 255, 0.15);
      color: var(--info);
      border: 1px solid rgba(0, 170, 255, 0.3);
    }

    /* Toggle */
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 26px;
      background: rgba(255, 170, 0, 0.2);
      border-radius: 13px;
      cursor: pointer;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .toggle-switch.active {
      background: var(--warning);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: left 0.3s;
    }

    .toggle-switch.active::after {
      left: 27px;
    }

    .toggle-switch.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }

    .toggle-switch.disabled::after {
      background: #888;
    }

    /* Card body */
    .card-description {
      color: var(--text-secondary);
      font-size: 0.8rem;
      line-height: 1.6;
    }

    /* Card footer */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(42, 42, 62, 0.5);
      font-size: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .card-meta {
      color: var(--text-muted);
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .card-meta span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .card-website a {
      color: var(--info);
      text-decoration: none;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.3s;
    }

    .card-website a:hover {
      color: var(--accent);
    }

    /* Loading & empty states */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    /* Toast notifications */
    .toast-container {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .toast {
      background: var(--bg-card);
      border: 1px solid var(--accent);
      color: var(--text-primary);
      padding: 0.8rem 1.2rem;
      font-size: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      max-width: 350px;
      animation: slideIn 0.3s ease-out;
    }

    .toast.error {
      border-color: var(--error);
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 1rem; }
      .services-grid { grid-template-columns: 1fr; }
      .category-title { font-size: 1.3rem; }
      header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="page-title">Loading...</h1>
      <nav class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/database.html">Database</a>
        <a href="/firewall.html">Firewall</a>
        <a href="/logs.html">Logs</a>
        <a href="/databricks.html">Integrations</a>
      </nav>
    </header>

    <div class="category-header">
      <div id="category-description" class="category-description"></div>
      <div id="category-stats" class="category-stats"></div>
    </div>

    <div id="pending-banner" class="pending-banner">
      Pending changes in this category. <a href="/">Go to Dashboard</a> to deploy.
    </div>

    <div id="services-grid" class="services-grid">
      <div class="loading">Loading services...</div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
    // Category registry
    const CATEGORIES = {
      'core': { name: 'Core Infrastructure', description: 'Essential services that keep your Nexus Stack running. These cannot be disabled.' },
      'databases': { name: 'Databases & Storage', description: 'Relational databases, object storage systems, and data lakes for persisting and managing your data.' },
      'db-management': { name: 'Database Management', description: 'Web-based tools for administering, browsing, and managing your databases and object storage.' },
      'orchestration': { name: 'Data Orchestration', description: 'Platforms for building, scheduling, and monitoring data pipelines and ETL/ELT workflows.' },
      'streaming': { name: 'Stream Processing', description: 'Engines and frameworks for real-time data processing, CDC, and streaming pipelines.' },
      'messaging': { name: 'Message Brokers', description: 'Event streaming platforms and management UIs for Kafka/Redpanda message brokers.' },
      'analytics': { name: 'Analytics & BI', description: 'Business intelligence, search engines, metadata management, and distributed query engines.' },
      'data-quality': { name: 'Data Quality', description: 'Tools for testing, validating, and monitoring the quality of your data.' },
      'ai-ml': { name: 'AI & Machine Learning', description: 'LLM inference, AI workflow builders, and machine learning platforms.' },
      'dev-tools': { name: 'Development Tools', description: 'IDEs, notebooks, API testing platforms, and developer utilities.' },
      'ci-cd': { name: 'CI/CD & Automation', description: 'Continuous integration, deployment pipelines, and workflow automation tools.' },
      'low-code': { name: 'Low-Code Platforms', description: 'Build internal tools, CRUD apps, and spreadsheet interfaces without extensive coding.' },
      'observability': { name: 'Observability', description: 'Monitoring agents, log pipelines, and uptime tracking for your infrastructure.' },
      'knowledge': { name: 'Knowledge & Docs', description: 'Wiki platforms, knowledge bases, and email testing tools.' },
      'visual-tools': { name: 'Visual Tools', description: 'Diagramming, whiteboard, and visual collaboration tools.' },
      'files': { name: 'File Management', description: 'Web-based file managers for browsing and managing files across storage backends.' },
      'server-access': { name: 'Server Access', description: 'Tools for accessing your server via browser-based terminals and Git proxies.' },
    };

    const API_URL = window.location.origin;
    const params = new URLSearchParams(window.location.search);
    const categorySlug = params.get('cat');

    // Initialize page
    function initPage() {
      const cat = CATEGORIES[categorySlug];
      if (!cat) {
        document.getElementById('page-title').textContent = 'Unknown Category';
        document.getElementById('services-grid').innerHTML = '<div class="empty-state">Category not found. <a href="/" style="color: var(--accent);">Back to Dashboard</a></div>';
        return;
      }

      document.title = `${cat.name} - Nexus Control Plane`;
      document.getElementById('page-title').textContent = cat.name;
      document.getElementById('category-description').textContent = cat.description;

      loadServices();
    }

    async function loadServices() {
      try {
        const response = await fetch(`${API_URL}/api/services?category=${encodeURIComponent(categorySlug)}`, {
          credentials: 'same-origin'
        });
        if (!response.ok) return;

        const data = await response.json();
        if (data.success) {
          renderServices(data.services || []);
        }
      } catch (error) {
        console.error('Failed to load services:', error);
        document.getElementById('services-grid').innerHTML = '<div class="empty-state">Failed to load services.</div>';
      }
    }

    function renderServices(services) {
      const grid = document.getElementById('services-grid');
      grid.innerHTML = '';

      if (!services.length) {
        grid.innerHTML = '<div class="empty-state">No services in this category.</div>';
        return;
      }

      // Stats
      const total = services.length;
      const enabled = services.filter(s => s.enabled).length;
      const pending = services.filter(s => s.pending).length;

      document.getElementById('category-stats').innerHTML = `
        <span class="count-enabled">${enabled} / ${total} enabled</span>
        ${pending > 0 ? `<span class="count-pending">${pending} pending</span>` : ''}
      `;

      // Pending banner
      const banner = document.getElementById('pending-banner');
      if (pending > 0) {
        banner.classList.add('visible');
      }

      // Render cards
      services.forEach(service => {
        const card = document.createElement('div');
        card.className = 'service-card' + (service.pending ? ' pending' : '');
        card.id = `service-${service.name}`;

        // Badges
        let badges = '';
        if (service.core) badges += '<span class="badge badge-core">core</span>';
        if (service.admin_only) badges += '<span class="badge badge-admin">admin</span>';
        if (service.public) badges += '<span class="badge badge-public">public</span>';
        if (!service.subdomain) badges += '<span class="badge badge-internal">internal</span>';
        if (service.pending) {
          const label = service.enabled ? 'will enable' : 'will disable';
          badges += `<span class="badge badge-pending">${label}</span>`;
        }

        // Toggle
        const isDisabled = service.core || service.admin_only;
        const toggleClass = `toggle-switch${service.enabled ? ' active' : ''}${isDisabled ? ' disabled' : ''}`;
        const toggleTitle = service.core ? 'Core service - cannot be disabled' :
                           service.admin_only ? 'Admin-only - managed via GitHub Actions' : '';

        // Description (prefer long_description)
        const desc = service.long_description || service.description || '';

        // Website link
        let websiteHtml = '';
        if (service.website) {
          const domain = new URL(service.website).hostname.replace('www.', '');
          websiteHtml = `<div class="card-website"><a href="${service.website}" target="_blank" rel="noopener">${domain} &#8599;</a></div>`;
        }

        // Meta info
        let metaItems = '';
        if (service.subdomain) metaItems += `<span>:${service.port}</span>`;
        if (service.subdomain) metaItems += `<span>${service.subdomain}.*</span>`;

        card.innerHTML = `
          <div class="card-header">
            <div class="card-name-section">
              <div class="card-name">${service.name} ${badges}</div>
            </div>
            <div class="${toggleClass}" id="toggle-${service.name}" title="${toggleTitle}"
                 onclick="handleToggle('${service.name}', ${!service.enabled}, this)"></div>
          </div>
          <div class="card-description">${desc}</div>
          <div class="card-footer">
            <div class="card-meta">${metaItems}</div>
            ${websiteHtml}
          </div>
        `;

        grid.appendChild(card);
      });

      // Scroll to service if hash present
      if (window.location.hash) {
        const el = document.getElementById(`service-${window.location.hash.slice(1)}`);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          el.style.boxShadow = '0 0 20px rgba(0, 255, 136, 0.4)';
          setTimeout(() => { el.style.boxShadow = ''; }, 2000);
        }
      }
    }

    async function handleToggle(serviceName, enabled, toggleEl) {
      if (toggleEl.classList.contains('disabled')) return;
      toggleEl.classList.add('disabled');

      try {
        const response = await fetch(`${API_URL}/api/services`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ service: serviceName, enabled }),
        });

        const data = await response.json();
        if (data.success) {
          showToast(`${serviceName} ${enabled ? 'enabled' : 'disabled'}. Deploy from Dashboard.`);
          // Reload to refresh state
          loadServices();
        } else {
          showToast(data.error || 'Failed to update service', true);
          toggleEl.classList.remove('disabled');
        }
      } catch (error) {
        showToast('Failed to update service', true);
        toggleEl.classList.remove('disabled');
      }
    }

    function showToast(message, isError = false) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // Init
    initPage();
  </script>
</body>
</html>
