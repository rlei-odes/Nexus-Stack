<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database - Nexus Control Plane</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: var(--accent); }

    .card h3 {
      color: var(--accent);
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }

    .card p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .card .count {
      font-size: 2rem;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .key { color: var(--accent); font-weight: 500; }
    .value { color: var(--text-primary); }

    .timestamp {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .enabled { color: var(--accent); }
    .disabled { color: var(--error); }

    .empty {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Database</h1>
      <nav class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/database.html" class="active">Database</a>
        <a href="/firewall.html">Firewall</a>
        <a href="/logs.html">Logs</a>
        <a href="/settings.html">Settings</a>
        <a href="/databricks.html">Integrations</a>
      </nav>
    </header>

    <div class="card-grid">
      <div class="card">
        <h3>Logs</h3>
        <div class="count" id="logsCount">-</div>
        <p>Workflow and system logs</p>
        <a href="/logs.html" class="btn-primary">View Logs</a>
      </div>

      <div class="card">
        <h3>Config</h3>
        <div class="count" id="configCount">-</div>
        <p>Scheduled teardown settings</p>
        <button class="btn-primary" onclick="scrollTo('configSection')">View Below</button>
      </div>

      <div class="card">
        <h3>Services</h3>
        <div class="count" id="servicesCount">-</div>
        <p>Enabled/disabled services</p>
        <button class="btn-primary" onclick="scrollTo('servicesSection')">View Below</button>
      </div>
    </div>

    <div class="section" id="configSection">
      <h2>Config Table</h2>
      <div class="actions">
        <button class="btn-primary" onclick="loadConfig()">Refresh</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Key</th>
            <th>Value</th>
            <th>Updated</th>
          </tr>
        </thead>
        <tbody id="configTable">
          <tr><td colspan="3" class="loading"><span class="spinner"></span> Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="section" id="servicesSection">
      <h2>Services Table</h2>
      <div class="actions">
        <button class="btn-primary" onclick="loadServices()">Refresh</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Service</th>
            <th>Status</th>
            <th>Updated</th>
          </tr>
        </thead>
        <tbody id="servicesTable">
          <tr><td colspan="3" class="loading"><span class="spinner"></span> Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    function scrollTo(id) {
      document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
    }

    async function loadConfig() {
      try {
        const res = await fetch('/api/scheduled-teardown');
        const data = await res.json();

        if (!data.success) throw new Error(data.error);

        const config = data.config || {};
        const rows = [
          { key: 'teardown_enabled', value: config.enabled ? 'true' : 'false' },
          { key: 'teardown_timezone', value: config.timezone || '-' },
          { key: 'teardown_time', value: config.teardownTime || '-' },
          { key: 'notification_time', value: config.notificationTime || '-' },
          { key: 'delay_until', value: config.delayUntil || '-' },
        ];

        document.getElementById('configCount').textContent = rows.length;
        document.getElementById('configTable').innerHTML = rows.map(r => `
          <tr>
            <td class="key">${r.key}</td>
            <td class="value">${r.value}</td>
            <td class="timestamp">-</td>
          </tr>
        `).join('');

      } catch (err) {
        document.getElementById('configTable').innerHTML =
          `<tr><td colspan="3" class="empty" style="color: var(--error)">Error: ${err.message}</td></tr>`;
      }
    }

    async function loadServices() {
      try {
        const res = await fetch('/api/services');
        const data = await res.json();

        if (!data.success) throw new Error(data.error);

        const services = data.services || [];

        document.getElementById('servicesCount').textContent = services.length;

        if (services.length === 0) {
          document.getElementById('servicesTable').innerHTML =
            '<tr><td colspan="3" class="empty">No services configured</td></tr>';
          return;
        }

        document.getElementById('servicesTable').innerHTML = services.map(s => `
          <tr>
            <td class="key">${s.name}</td>
            <td class="${s.enabled ? 'enabled' : 'disabled'}">${s.enabled ? '✓ Enabled' : '✗ Disabled'}</td>
            <td class="timestamp">-</td>
          </tr>
        `).join('');

      } catch (err) {
        document.getElementById('servicesTable').innerHTML =
          `<tr><td colspan="3" class="empty" style="color: var(--error)">Error: ${err.message}</td></tr>`;
      }
    }

    async function loadLogsCount() {
      try {
        const res = await fetch('/api/logs?limit=1');
        const data = await res.json();
        if (data.success) {
          // Just show that logs exist
          document.getElementById('logsCount').textContent = data.count > 0 ? '✓' : '0';
        }
      } catch {
        document.getElementById('logsCount').textContent = '-';
      }
    }

    // Initial load
    loadConfig();
    loadServices();
    loadLogsCount();
  </script>
</body>
</html>
