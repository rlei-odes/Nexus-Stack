<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Stacks - Nexus Control Plane</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a2e;
      --accent: #00ff88;
      --accent-dim: #00cc6a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      --border: #2a2a3e;
      --error: #ff4444;
      --warning: #ffaa00;
      --info: #00aaff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -2;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 1rem;
    }

    h1 {
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: all 0.3s;
    }

    .nav-links a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Search input */
    .search-bar {
      margin-bottom: 1.5rem;
    }

    .search-input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(0, 10, 5, 0.8);
      border: 1px solid rgba(0, 255, 136, 0.3);
      color: #c0d0c0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      border-radius: 4px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.15);
    }

    .search-input::placeholder { color: #607080; }

    .result-count {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 1.2rem;
    }

    .result-count strong {
      color: var(--accent);
    }

    /* Service cards grid - same as category.html */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1.2rem;
    }

    .service-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 1.2rem;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .service-card:hover {
      border-color: rgba(0, 255, 136, 0.3);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
    }

    .service-card.pending {
      border-left: 3px solid var(--warning);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .card-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 0.65rem;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-core { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; border: 1px solid rgba(255, 107, 107, 0.3); }
    .badge-admin { background: rgba(136, 136, 136, 0.2); color: #888; border: 1px solid rgba(136, 136, 136, 0.3); }
    .badge-public { background: rgba(255, 170, 0, 0.2); color: var(--warning); border: 1px solid rgba(255, 170, 0, 0.3); }
    .badge-pending { background: rgba(255, 215, 0, 0.15); color: #ffd700; border: 1px solid rgba(255, 215, 0, 0.3); animation: pulse 2s infinite; }
    .badge-internal { background: rgba(0, 170, 255, 0.15); color: var(--info); border: 1px solid rgba(0, 170, 255, 0.3); }
    .badge-category { background: rgba(0, 170, 255, 0.1); color: var(--info); border: 1px solid rgba(0, 170, 255, 0.2); }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    .toggle-switch {
      position: relative;
      width: 50px;
      height: 26px;
      background: rgba(255, 170, 0, 0.2);
      border-radius: 13px;
      cursor: pointer;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .toggle-switch.active { background: var(--warning); }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: left 0.3s;
    }
    .toggle-switch.active::after { left: 27px; }
    .toggle-switch.disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    .toggle-switch.disabled::after { background: #888; }

    .card-description {
      color: var(--text-secondary);
      font-size: 0.8rem;
      line-height: 1.6;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(42, 42, 62, 0.5);
      font-size: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .card-meta {
      color: var(--text-muted);
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .card-open-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 3px;
      transition: all 0.3s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-open-link:hover {
      background: rgba(0, 255, 136, 0.15);
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
    }
    .card-project-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.7rem;
      transition: color 0.3s;
    }
    .card-project-link:hover { color: var(--info); }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .toast-container {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .toast {
      background: var(--bg-card);
      border: 1px solid var(--accent);
      color: var(--text-primary);
      padding: 0.8rem 1.2rem;
      font-size: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      max-width: 350px;
      animation: slideIn 0.3s ease-out;
    }
    .toast.error { border-color: var(--error); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      body { padding: 1rem; }
      .services-grid { grid-template-columns: 1fr; }
      header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Search Stacks</h1>
      <nav class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/database.html">Database</a>
        <a href="/firewall.html">Firewall</a>
        <a href="/logs.html">Logs</a>
        <a href="/settings.html">Settings</a>
        <a href="/databricks.html">Integrations</a>
      </nav>
    </header>

    <div class="search-bar">
      <input type="text" id="search-input" class="search-input" placeholder="Search stacks by name, description, or category..." autofocus>
    </div>

    <div id="result-count" class="result-count"></div>
    <div id="services-grid" class="services-grid"></div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
    const CATEGORIES = {
      'core': { name: 'Core Infrastructure' },
      'databases': { name: 'Databases & Storage' },
      'db-management': { name: 'Database Management' },
      'orchestration': { name: 'Data Orchestration' },
      'streaming': { name: 'Stream Processing' },
      'messaging': { name: 'Message Brokers' },
      'analytics': { name: 'Analytics & BI' },
      'data-quality': { name: 'Data Quality' },
      'ai-ml': { name: 'AI & Machine Learning' },
      'dev-tools': { name: 'Development Tools' },
      'ci-cd': { name: 'CI/CD & Automation' },
      'low-code': { name: 'Low-Code Platforms' },
      'observability': { name: 'Observability' },
      'knowledge': { name: 'Knowledge & Docs' },
      'visual-tools': { name: 'Visual Tools' },
      'files': { name: 'File Management' },
      'server-access': { name: 'Server Access' },
    };

    const API_URL = window.location.origin;
    let allServices = [];
    let stackDomain = window.location.hostname.replace('control.', '');

    async function fetchDomain() {
      try {
        const res = await fetch(`${API_URL}/api/info`, { credentials: 'same-origin' });
        const data = await res.json();
        if (data.success && data.info?.server?.domain) {
          stackDomain = data.info.server.domain;
        }
      } catch {}
    }

    async function loadAllServices() {
      try {
        await fetchDomain();
        const response = await fetch(`${API_URL}/api/services`, { credentials: 'same-origin' });
        if (!response.ok) return;
        const data = await response.json();
        if (data.success) {
          allServices = data.services || [];
          // Run initial search from URL
          const params = new URLSearchParams(window.location.search);
          const q = params.get('q') || '';
          if (q) {
            document.getElementById('search-input').value = q;
            filterAndRender(q);
          }
        }
      } catch (error) {
        console.error('Failed to load services:', error);
      }
    }

    function filterAndRender(query) {
      const grid = document.getElementById('services-grid');
      const countEl = document.getElementById('result-count');
      grid.innerHTML = '';

      if (!query || query.length < 1) {
        countEl.innerHTML = '';
        // Show all services when no query
        renderCards(allServices);
        countEl.innerHTML = `Showing all <strong>${allServices.length}</strong> stacks`;
        return;
      }

      const q = query.toLowerCase();
      const matches = allServices.filter(s =>
        s.name.toLowerCase().includes(q) ||
        s.description.toLowerCase().includes(q) ||
        (s.long_description && s.long_description.toLowerCase().includes(q)) ||
        (s.category && CATEGORIES[s.category] && CATEGORIES[s.category].name.toLowerCase().includes(q))
      );

      if (matches.length === 0) {
        grid.innerHTML = `<div class="empty-state">No stacks found matching "${query}"</div>`;
        countEl.innerHTML = `<strong>0</strong> results for "${query}"`;
        return;
      }

      countEl.innerHTML = `Found <strong>${matches.length}</strong> stack${matches.length !== 1 ? 's' : ''} matching "${query}"`;
      renderCards(matches);
    }

    function renderCards(services) {
      const grid = document.getElementById('services-grid');

      services.forEach(service => {
        const card = document.createElement('div');
        card.className = 'service-card' + (service.pending ? ' pending' : '');

        let badges = '';
        if (service.core) badges += '<span class="badge badge-core">core</span>';
        if (service.admin_only) badges += '<span class="badge badge-admin">admin</span>';
        if (service.public) badges += '<span class="badge badge-public">public</span>';
        if (!service.subdomain) badges += '<span class="badge badge-internal">internal</span>';
        if (service.pending) {
          const label = service.enabled ? 'will enable' : 'will disable';
          badges += `<span class="badge badge-pending">${label}</span>`;
        }

        const catName = CATEGORIES[service.category] ? CATEGORIES[service.category].name : service.category;
        badges += `<span class="badge badge-category">${catName}</span>`;

        const isDisabled = service.core || service.admin_only;
        const toggleClass = `toggle-switch${service.enabled ? ' active' : ''}${isDisabled ? ' disabled' : ''}`;
        const toggleTitle = service.core ? 'Core service - cannot be disabled' :
                           service.admin_only ? 'Admin-only - managed via GitHub Actions' : '';

        const desc = service.long_description || service.description || '';

        let openHtml = '';
        if (service.subdomain && service.deployed) {
          const serviceUrl = `https://${service.subdomain}.${stackDomain}`;
          openHtml = `<a href="${serviceUrl}" target="_blank" rel="noopener" class="card-open-link">Open &#8599;</a>`;
        }

        let websiteHtml = '';
        if (service.website) {
          try {
            const wDomain = new URL(service.website).hostname.replace('www.', '');
            websiteHtml = `<a href="${service.website}" target="_blank" rel="noopener" class="card-project-link">${wDomain}</a>`;
          } catch {}
        }

        card.innerHTML = `
          <div class="card-header">
            <div>
              <div class="card-name">${service.name} ${badges}</div>
            </div>
            <div class="${toggleClass}" title="${toggleTitle}"
                 onclick="handleToggle('${service.name}', ${!service.enabled}, this)"></div>
          </div>
          <div class="card-description">${desc}</div>
          <div class="card-footer">
            <div class="card-meta">${websiteHtml}</div>
            ${openHtml}
          </div>
        `;

        grid.appendChild(card);
      });
    }

    async function handleToggle(serviceName, enabled, toggleEl) {
      if (toggleEl.classList.contains('disabled')) return;
      toggleEl.classList.add('disabled');

      try {
        const response = await fetch(`${API_URL}/api/services`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ service: serviceName, enabled }),
        });

        const data = await response.json();
        if (data.success) {
          showToast(`${serviceName} ${enabled ? 'enabled' : 'disabled'}. Deploy from Dashboard.`);
          // Reload services and re-filter
          await loadAllServices();
          const query = document.getElementById('search-input').value;
          filterAndRender(query);
        } else {
          showToast(data.error || 'Failed to update service', true);
          toggleEl.classList.remove('disabled');
        }
      } catch (error) {
        showToast('Failed to update service', true);
        toggleEl.classList.remove('disabled');
      }
    }

    function showToast(message, isError = false) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // Search input handler
    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        filterAndRender(e.target.value);
        // Update URL without reload
        const url = new URL(window.location);
        if (e.target.value) {
          url.searchParams.set('q', e.target.value);
        } else {
          url.searchParams.delete('q');
        }
        history.replaceState(null, '', url);
      }, 200);
    });

    loadAllServices();
  </script>
</body>
</html>
