<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Stacks - Nexus Control Plane</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* Search input */
    .search-bar {
      margin-bottom: 1.5rem;
    }

    .search-input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(0, 10, 5, 0.8);
      border: 1px solid rgba(0, 255, 136, 0.3);
      color: #c0d0c0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      border-radius: 4px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.15);
    }

    .search-input::placeholder { color: #607080; }

    .result-count {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 1.2rem;
    }

    .result-count strong {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Search Stacks</h1>
      <nav class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/database.html">Database</a>
        <a href="/firewall.html">Firewall</a>
        <a href="/logs.html">Logs</a>
        <a href="/settings.html">Settings</a>
        <a href="/databricks.html">Integrations</a>
      </nav>
    </header>

    <div class="search-bar">
      <input type="text" id="search-input" class="search-input" placeholder="Search stacks by name, description, or category..." autofocus>
    </div>

    <div id="result-count" class="result-count"></div>
    <div id="services-grid" class="services-grid"></div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
    const CATEGORIES = {
      'core': { name: 'Core Infrastructure' },
      'databases': { name: 'Databases' },
      'storage': { name: 'Object Storage' },
      'db-management': { name: 'Database Management' },
      'orchestration': { name: 'Data Orchestration' },
      'streaming': { name: 'Stream Processing' },
      'messaging': { name: 'Message Brokers' },
      'analytics': { name: 'Analytics & BI' },
      'data-quality': { name: 'Data Quality' },
      'ai-ml': { name: 'AI & Machine Learning' },
      'dev-tools': { name: 'Development Tools' },
      'ci-cd': { name: 'CI/CD & Automation' },
      'low-code': { name: 'Low-Code Platforms' },
      'observability': { name: 'Observability' },
      'knowledge': { name: 'Knowledge & Docs' },
      'visual-tools': { name: 'Visual Tools' },
      'files': { name: 'File Management' },
      'server-access': { name: 'Server Access' },
    };

    const API_URL = window.location.origin;
    let allServices = [];
    let stackDomain = window.location.hostname.replace('control.', '');

    async function fetchDomain() {
      try {
        const res = await fetch(`${API_URL}/api/info`, { credentials: 'same-origin' });
        const data = await res.json();
        if (data.success && data.info?.server?.domain) {
          stackDomain = data.info.server.domain;
        }
      } catch {}
    }

    async function loadAllServices() {
      try {
        await fetchDomain();
        const response = await fetch(`${API_URL}/api/services`, { credentials: 'same-origin' });
        if (!response.ok) return;
        const data = await response.json();
        if (data.success) {
          allServices = data.services || [];
          // Run initial search from URL
          const params = new URLSearchParams(window.location.search);
          const q = params.get('q') || '';
          if (q) {
            document.getElementById('search-input').value = q;
            filterAndRender(q);
          }
        }
      } catch (error) {
        console.error('Failed to load services:', error);
      }
    }

    function filterAndRender(query) {
      const grid = document.getElementById('services-grid');
      const countEl = document.getElementById('result-count');
      grid.innerHTML = '';

      if (!query || query.length < 1) {
        countEl.innerHTML = '';
        // Show all services when no query
        renderCards(allServices);
        countEl.innerHTML = `Showing all <strong>${allServices.length}</strong> stacks`;
        return;
      }

      const q = query.toLowerCase();
      const matches = allServices.filter(s =>
        s.name.toLowerCase().includes(q) ||
        s.description.toLowerCase().includes(q) ||
        (s.long_description && s.long_description.toLowerCase().includes(q)) ||
        (s.category && CATEGORIES[s.category] && CATEGORIES[s.category].name.toLowerCase().includes(q))
      );

      if (matches.length === 0) {
        grid.innerHTML = `<div class="empty-state">No stacks found matching "${query}"</div>`;
        countEl.innerHTML = `<strong>0</strong> results for "${query}"`;
        return;
      }

      countEl.innerHTML = `Found <strong>${matches.length}</strong> stack${matches.length !== 1 ? 's' : ''} matching "${query}"`;
      renderCards(matches);
    }

    function renderCards(services) {
      const grid = document.getElementById('services-grid');

      services.forEach(service => {
        const card = document.createElement('div');
        card.className = 'service-card' + (service.pending ? ' pending' : '');

        let badges = '';
        if (service.core) badges += '<span class="badge badge-core">core</span>';
        if (service.admin_only) badges += '<span class="badge badge-admin">admin</span>';
        if (service.public) badges += '<span class="badge badge-public">public</span>';
        if (!service.subdomain) badges += '<span class="badge badge-internal">internal</span>';
        if (service.pending) {
          const label = service.enabled ? 'will enable' : 'will disable';
          badges += `<span class="badge badge-pending">${label}</span>`;
        }

        const catName = CATEGORIES[service.category] ? CATEGORIES[service.category].name : service.category;
        badges += `<span class="badge badge-category">${catName}</span>`;

        const isDisabled = service.core || service.admin_only;
        const toggleClass = `toggle-switch${service.enabled ? ' active' : ''}${isDisabled ? ' disabled' : ''}`;
        const toggleTitle = service.core ? 'Core service - cannot be disabled' :
                           service.admin_only ? 'Admin-only - managed via GitHub Actions' : '';

        const desc = service.long_description || service.description || '';

        let openHtml = '';
        if (service.subdomain && service.deployed) {
          const serviceUrl = `https://${service.subdomain}.${stackDomain}`;
          openHtml = `<a href="${serviceUrl}" target="_blank" rel="noopener" class="card-open-link">Open &#8599;</a>`;
        }

        let websiteHtml = '';
        if (service.website) {
          try {
            const wDomain = new URL(service.website).hostname.replace('www.', '');
            websiteHtml = `<a href="${service.website}" target="_blank" rel="noopener" class="card-project-link">${wDomain}</a>`;
          } catch {}
        }

        card.innerHTML = `
          <div class="card-header">
            <div>
              <div class="card-name">${service.name} ${badges}</div>
            </div>
            <div class="${toggleClass}" title="${toggleTitle}"
                 onclick="handleToggle('${service.name}', ${!service.enabled}, this)"></div>
          </div>
          <div class="card-description">${desc}</div>
          <div class="card-footer">
            <div class="card-meta">${websiteHtml}</div>
            ${openHtml}
          </div>
        `;

        grid.appendChild(card);
      });
    }

    async function handleToggle(serviceName, enabled, toggleEl) {
      if (toggleEl.classList.contains('disabled')) return;
      toggleEl.classList.add('disabled');

      try {
        const response = await fetch(`${API_URL}/api/services`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ service: serviceName, enabled }),
        });

        const data = await response.json();
        if (data.success) {
          showToast(`${serviceName} ${enabled ? 'enabled' : 'disabled'}. Deploy from Dashboard.`);
          // Reload services and re-filter
          await loadAllServices();
          const query = document.getElementById('search-input').value;
          filterAndRender(query);
        } else {
          showToast(data.error || 'Failed to update service', true);
          toggleEl.classList.remove('disabled');
        }
      } catch (error) {
        showToast('Failed to update service', true);
        toggleEl.classList.remove('disabled');
      }
    }

    function showToast(message, isError = false) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // Search input handler
    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        filterAndRender(e.target.value);
        // Update URL without reload
        const url = new URL(window.location);
        if (e.target.value) {
          url.searchParams.set('q', e.target.value);
        } else {
          url.searchParams.delete('q');
        }
        history.replaceState(null, '', url);
      }, 200);
    });

    loadAllServices();
  </script>
</body>
</html>
