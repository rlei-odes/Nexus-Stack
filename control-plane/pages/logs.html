<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs - Nexus Control Plane</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .filter-group label {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    .filter-group select {
      width: auto;
    }

    .btn-danger {
      background: var(--error);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
    }

    .btn-danger:hover { opacity: 0.8; }

    .stats {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    .stats span { color: var(--accent); }

    .table-wrapper {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .level {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .level-debug { background: var(--text-muted); color: white; }
    .level-info { background: var(--info); color: white; }
    .level-warn { background: var(--warning); color: black; }
    .level-error { background: var(--error); color: white; }

    .source {
      color: var(--accent);
      font-weight: 500;
    }

    .message {
      max-width: 400px;
      word-break: break-word;
    }

    .metadata {
      max-width: 200px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      word-break: break-all;
    }

    .metadata pre {
      margin: 0;
      white-space: pre-wrap;
    }

    .timestamp {
      color: var(--text-muted);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .empty {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Logs</h1>
      <nav class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/database.html">Database</a>
        <a href="/firewall.html">Firewall</a>
        <a href="/logs.html" class="active">Logs</a>
        <a href="/settings.html">Settings</a>
        <a href="/databricks.html">Integrations</a>
      </nav>
    </header>

    <div class="filters">
      <div class="filter-group">
        <label>Source:</label>
        <select id="sourceFilter">
          <option value="">All</option>
          <option value="github-action">GitHub Action</option>
          <option value="worker">Worker</option>
          <option value="api">API</option>
          <option value="health-check">Health Check</option>
          <option value="deploy">Deploy</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Level:</label>
        <select id="levelFilter">
          <option value="">All</option>
          <option value="debug">Debug</option>
          <option value="info">Info</option>
          <option value="warn">Warning</option>
          <option value="error">Error</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Limit:</label>
        <select id="limitFilter">
          <option value="50">50</option>
          <option value="100" selected>100</option>
          <option value="500">500</option>
        </select>
      </div>

      <button class="btn-primary" onclick="loadLogs()">Refresh</button>
      <button class="btn-danger" onclick="clearOldLogs()">Clear Old (30d)</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Source</th>
            <th>Level</th>
            <th>Message</th>
            <th>Run ID</th>
            <th>Metadata</th>
          </tr>
        </thead>
        <tbody id="logsTable">
          <tr><td colspan="6" class="loading"><span class="spinner"></span> Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    let currentOffset = 0;

    async function loadLogs() {
      const source = document.getElementById('sourceFilter').value;
      const level = document.getElementById('levelFilter').value;
      const limit = document.getElementById('limitFilter').value;

      const params = new URLSearchParams();
      if (source) params.set('source', source);
      if (level) params.set('level', level);
      params.set('limit', limit);
      params.set('offset', currentOffset);

      document.getElementById('logsTable').innerHTML =
        '<tr><td colspan="6" class="loading"><span class="spinner"></span> Loading...</td></tr>';

      try {
        const res = await fetch(`/api/logs?${params}`);
        const data = await res.json();

        if (!data.success) {
          throw new Error(data.error);
        }

        const logs = data.logs || [];

        // Update stats (escape filter values even though they come from select elements)
        const statsHtml = ['Showing <span>' + logs.length + '</span> logs'];
        if (source) statsHtml.push(' from <span>' + escapeHtml(source) + '</span>');
        if (level) statsHtml.push(' with level <span>' + escapeHtml(level) + '</span>');
        document.getElementById('stats').innerHTML = statsHtml.join('');

        if (logs.length === 0) {
          document.getElementById('logsTable').innerHTML =
            '<tr><td colspan="6" class="empty">No logs found</td></tr>';
          return;
        }

        document.getElementById('logsTable').innerHTML = logs.map(log => `
          <tr>
            <td class="timestamp">${formatTime(log.created_at)}</td>
            <td class="source">${escapeHtml(log.source || '-')}</td>
            <td><span class="level level-${escapeHtml(log.level)}">${escapeHtml(log.level)}</span></td>
            <td class="message">${escapeHtml(log.message)}</td>
            <td class="timestamp">${escapeHtml(log.run_id || '-')}</td>
            <td class="metadata">${log.metadata ? `<pre>${escapeHtml(JSON.stringify(log.metadata, null, 2))}</pre>` : '-'}</td>
          </tr>
        `).join('');

        // Pagination
        const limitNum = parseInt(limit);
        document.getElementById('pagination').innerHTML = `
          ${currentOffset > 0 ? `<button class="btn-primary" onclick="prevPage()">Previous</button>` : ''}
          ${logs.length >= limitNum ? `<button class="btn-primary" onclick="nextPage()">Next</button>` : ''}
        `;

      } catch (err) {
        document.getElementById('logsTable').innerHTML =
          `<tr><td colspan="6" class="empty" style="color: var(--error)">Error: ${err.message}</td></tr>`;
      }
    }

    function prevPage() {
      const limit = parseInt(document.getElementById('limitFilter').value);
      currentOffset = Math.max(0, currentOffset - limit);
      loadLogs();
    }

    function nextPage() {
      const limit = parseInt(document.getElementById('limitFilter').value);
      currentOffset += limit;
      loadLogs();
    }

    async function clearOldLogs() {
      if (!confirm('Delete logs older than 30 days?')) return;

      try {
        const res = await fetch('/api/logs?days=30', { method: 'DELETE' });
        const data = await res.json();

        if (data.success) {
          alert(`Deleted ${data.deleted} old log(s)`);
          loadLogs();
        } else {
          alert('Error: ' + data.error);
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    function formatTime(isoString) {
      if (!isoString) return '-';
      const d = new Date(isoString + 'Z');
      return d.toLocaleString('de-CH');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Auto-refresh filters
    document.getElementById('sourceFilter').onchange = () => { currentOffset = 0; loadLogs(); };
    document.getElementById('levelFilter').onchange = () => { currentOffset = 0; loadLogs(); };
    document.getElementById('limitFilter').onchange = () => { currentOffset = 0; loadLogs(); };

    // Initial load
    loadLogs();
  </script>
</body>
</html>
