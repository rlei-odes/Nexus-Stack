# =============================================================================
# RisingWave - Streaming SQL Database
# =============================================================================
# PostgreSQL-compatible streaming database for real-time analytics.
# Processes streaming data with materialized views using standard SQL.
#
# Access: https://risingwave.YOUR_DOMAIN (Dashboard UI)
# PostgreSQL: Port 4566 (for psql, Adminer, JDBC clients)
#
# No authentication by default (protected by Cloudflare Access + Hetzner Firewall)
#
# Documentation: https://docs.risingwave.com
# =============================================================================

services:
  risingwave:
    image: ${IMAGE_RISINGWAVE:-risingwavelabs/risingwave:v2.8.1}
    container_name: risingwave
    restart: unless-stopped
    command:
      - "single_node"
      - "--prometheus-listener-addr"
      - "0.0.0.0:1250"
      - "--prometheus-endpoint"
      - "http://grafana-prometheus:9090"
    ports:
      - "4566:4566"
      - "5691:5691"
      - "1250:1250"
    volumes:
      - risingwave-data:/risingwave
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "psql -h localhost -p 4566 -U root -d dev -c 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  risingwave-data:

networks:
  app-network:
    external: true
