# =============================================================================
# Dinky - Flink SQL IDE
# =============================================================================
# Access via: https://dinky.${domain} (Web UI)
# Dinky is a real-time data development platform based on Apache Flink,
# providing a web-based SQL editor with auto-completion, syntax verification,
# job management, and real-time debugging.
#
# IMAGE: dinkydocker/dinky-standalone-server with built-in H2 database
# (no external MySQL/PostgreSQL needed). ARM64 supported.
#
# FLINK CONNECTION: Dinky connects to the Flink JobManager via app-network.
# After first login, add the Flink cluster in: Settings → Cluster Management
# → Add → REST address: http://flink-jobmanager:8081
#
# SECURITY:
# - Protected by Cloudflare Access (email OTP authentication)
# - Admin password generated by OpenTofu and stored in Infisical
# - Default credentials (admin/dinky123!@#) are overridden at deploy time
# =============================================================================

services:
  dinky:
    image: ${IMAGE_DINKY:-dinkydocker/dinky-standalone-server:1.2.5-flink1.20}
    container_name: dinky
    hostname: dinky
    restart: unless-stopped
    environment:
      DB_ACTIVE: h2
    env_file:
      - path: .env
        required: false
    ports:
      - "8889:8888"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1536m
        reservations:
          cpus: "0.25"
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

networks:
  app-network:
    external: true
