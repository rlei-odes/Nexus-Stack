# =============================================================================
# Debezium - Change Data Capture (CDC) Platform
# =============================================================================
# Kafka Connect with Debezium CDC connectors. Streams database changes
# (INSERT/UPDATE/DELETE) to Redpanda/Kafka topics in real time.
#
# Includes connectors for PostgreSQL, MySQL, MongoDB, SQL Server, and more.
# Manage connectors via Kafka-UI, AKHQ, or the REST API.
#
# Access: https://debezium.<domain> (REST API)
# Docs: https://debezium.io/documentation/
# =============================================================================

services:
  debezium:
    image: ${IMAGE_DEBEZIUM:-quay.io/debezium/connect:3.5.0}
    container_name: debezium
    restart: unless-stopped
    ports:
      - "8097:8083"
    environment:
      - BOOTSTRAP_SERVERS=redpanda:9092
      - GROUP_ID=debezium-connect
      - CONFIG_STORAGE_TOPIC=_debezium-configs
      - OFFSET_STORAGE_TOPIC=_debezium-offsets
      - STATUS_STORAGE_TOPIC=_debezium-status
      - KEY_CONVERTER_SCHEMAS_ENABLE=false
      - VALUE_CONVERTER_SCHEMAS_ENABLE=false
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    external: true
