# Vector configuration
# Collects Docker container logs and forwards to Loki
# Edit this file to add more sources, transforms, and sinks
# Docs: https://vector.dev/docs/reference/configuration/

sources:
  docker_logs:
    type: docker_logs

transforms:
  parse_logs:
    type: remap
    inputs:
      - docker_logs
    source: |
      .service = .container_name

sinks:
  loki:
    type: loki
    inputs:
      - parse_logs
    endpoint: http://loki:3100
    labels:
      service: "{{ service }}"
      source: vector
    encoding:
      codec: text

  stdout:
    type: console
    inputs:
      - parse_logs
    encoding:
      codec: json
