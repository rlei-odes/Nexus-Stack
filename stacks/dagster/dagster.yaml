# Dagster instance configuration
# Mounted into DAGSTER_HOME for both webserver and daemon

storage:
  postgres:
    postgres_db:
      username: nexus-dagster
      password:
        env: DAGSTER_DB_PASSWORD
      hostname: dagster-postgres
      db_name: dagster
      port: 5432

run_launcher:
  module: dagster.core.launcher
  class: DefaultRunLauncher

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator

compute_logs:
  module: dagster.core.storage.local_compute_log_manager
  class: LocalComputeLogManager
  config:
    base_dir: /opt/dagster/dagster_home/compute_logs
